<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- background: rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="#2D6A4F"/>

  <!-- fork: 3 tines -->
  <line x1="22" y1="11" x2="22" y2="33" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="28" y1="11" x2="28" y2="33" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="34" y1="11" x2="34" y2="33" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- fork: crossbar -->
  <line x1="22" y1="33" x2="34" y2="33" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- fork: handle -->
  <line x1="28" y1="33" x2="28" y2="53" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- leaf (top right) -->
  <ellipse cx="45" cy="18" rx="7" ry="10" fill="white" transform="rotate(-20 45 18)"/>
  <!-- leaf vein -->
  <line x1="42" y1="24" x2="48" y2="12" stroke="#2D6A4F" stroke-width="1.5" stroke-linecap="round"/>
</svg>
