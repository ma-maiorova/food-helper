databaseChangeLog:
  - changeSet:
      id: 001-create-tables
      author: ma-maiorova
      changes:
        - createTable:
            tableName: delivery_service
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: code
                  type: VARCHAR(64)
                  constraints: { nullable: false, unique: true }
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints: { nullable: false }
              - column: { name: site_url, type: VARCHAR(512) }
              - column: { name: logo_url, type: VARCHAR(512) }
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints: { nullable: false }
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints: { nullable: false }
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints: { nullable: false }

        - createTable:
            tableName: product
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints: { primaryKey: true, nullable: false }
              - column: { name: name, type: VARCHAR(512), constraints: { nullable: false } }
              - column: { name: url, type: VARCHAR(1024), constraints: { nullable: false } }
              - column: { name: price, type: INT, constraints: { nullable: false } }
              - column:
                  name: currency
                  type: VARCHAR(8)
                  defaultValue: RUB
                  constraints: { nullable: false }
              - column:
                  name: delivery_service_id
                  type: BIGINT
                  constraints: { nullable: false }
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints: { nullable: false }
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints: { nullable: false }

        - createTable:
            tableName: product_variant
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: product_id
                  type: BIGINT
                  constraints: { nullable: false }
              - column: { name: manufacturer, type: VARCHAR(255) }
              - column: { name: composition, type: TEXT }
              - column: { name: weight, type: INT }
              - column: { name: calories, type: INT }
              - column: { name: protein, type: DOUBLE PRECISION }
              - column: { name: fat, type: DOUBLE PRECISION }
              - column: { name: carbs, type: DOUBLE PRECISION }

        - addForeignKeyConstraint:
            baseTableName: product
            baseColumnNames: delivery_service_id
            referencedTableName: delivery_service
            referencedColumnNames: id
            constraintName: fk_product_delivery_service

        - addForeignKeyConstraint:
            baseTableName: product_variant
            baseColumnNames: product_id
            referencedTableName: product
            referencedColumnNames: id
            constraintName: fk_variant_product
            onDelete: CASCADE

        - createIndex:
            indexName: idx_product_delivery_service
            tableName: product
            columns:
              - column: { name: delivery_service_id }

        - createIndex:
            indexName: idx_product_name
            tableName: product
            columns:
              - column: { name: name }

        - createIndex:
            indexName: idx_variant_calories
            tableName: product_variant
            columns:
              - column: { name: calories }

        - createIndex:
            indexName: idx_variant_protein
            tableName: product_variant
            columns:
              - column: { name: protein }

        - createIndex:
            indexName: idx_variant_fat
            tableName: product_variant
            columns:
              - column: { name: fat }

        - createIndex:
            indexName: idx_variant_carbs
            tableName: product_variant
            columns:
              - column: { name: carbs }
