# Индексы под запросы: поиск по названию (pg_trgm), фильтры по КБЖУ (составные).
# 001 уже создаёт: idx_product_delivery_service, idx_product_name (btree), по одному полю в variant.
databaseChangeLog:
  - changeSet:
      id: 003-pg-trgm-extension
      author: dev
      changes:
        - sql:
            sql: CREATE EXTENSION IF NOT EXISTS pg_trgm;
            splitStatements: false
      comment: Расширение для поиска по подстроке (ILIKE / LIKE с индексом)

  - changeSet:
      id: 003-product-name-search-gin
      author: dev
      changes:
        - sql:
            sql: CREATE INDEX IF NOT EXISTS idx_product_name_lower_gin ON product USING gin (lower(name) gin_trgm_ops);
            splitStatements: false
      comment: Поиск по названию - lower(name) и LIKE/ILIKE через trigram (GIN)

  - changeSet:
      id: 003-variant-product-calories
      author: dev
      changes:
        - createIndex:
            indexName: idx_variant_product_calories
            tableName: product_variant
            columns:
              - column: { name: product_id }
              - column: { name: calories }
      comment: Под выбор вариантов по product_id с фильтром по калориям

  - changeSet:
      id: 003-variant-calories-protein
      author: dev
      changes:
        - createIndex:
            indexName: idx_variant_calories_protein
            tableName: product_variant
            columns:
              - column: { name: calories }
              - column: { name: protein }
      comment: Частый фильтр - диапазоны калорий и белка

  - changeSet:
      id: 003-variant-calories-fat
      author: dev
      changes:
        - createIndex:
            indexName: idx_variant_calories_fat
            tableName: product_variant
            columns:
              - column: { name: calories }
              - column: { name: fat }
      comment: Частый фильтр - калории + жиры
