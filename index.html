/* ═══════════════════════════════════════════════════════
   API SERVICE
   ═══════════════════════════════════════════════════════ */
async function apiGetServices() {
  if (CFG.USE_MOCK) {
    await delay(300);
    return MOCK_SERVICES;
  }
  try {
    const r = await fetch(`${CFG.API_BASE}/api/v1/delivery-services?active=true`);
    if (!r.ok) return []; // non-fatal: show no service filters
    return r.json();
  } catch {
    return []; // network error — continue without service filter
  }
}

async function apiSearch({ q, page, size, serviceIds, minCal, maxCal, minProt, maxProt, minFat, maxFat, minCarbs, maxCarbs, sort }) {
  if (CFG.USE_MOCK) {
    await delay(750);
    return mockSearch({ q, page, size, serviceIds, minCal, maxCal, minProt, maxProt, minFat, maxFat, minCarbs, maxCarbs });
  }
  const params = new URLSearchParams();
  if (q)                          params.set('q', q);
  params.set('page', page);
  params.set('size', size);
  if (serviceIds?.length)         params.set('deliveryServiceIds', serviceIds.join(','));
  if (minCal > 0)                 params.set('minCalories', minCal);
  if (maxCal < 1000)              params.set('maxCalories', maxCal);
  if (minProt > 0)                params.set('minProtein',  minProt);
  if (maxProt < 100)              params.set('maxProtein',  maxProt);
  if (minFat  > 0)                params.set('minFat',      minFat);
  if (maxFat  < 100)              params.set('maxFat',      maxFat);
  if (minCarbs > 0)               params.set('minCarbs',    minCarbs);
  if (maxCarbs < 100)             params.set('maxCarbs',    maxCarbs);
  if (sort)                       params.set('sort', sort);
  const r = await fetch(`${CFG.API_BASE}/api/v1/products?${params}`);
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.message || `Ошибка сервера (${r.status})`);
  }
  return r.json(); // { items, page, size, totalElements, totalPages }
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function mockSearch({ q, page, size, serviceIds, minCal, maxCal, minProt, maxProt, minFat, maxFat, minCarbs, maxCarbs }) {
  const ql = (q || '').toLowerCase();
  const filtered = MOCK_ITEMS.filter(p => {
    if (ql && !p.name.toLowerCase().includes(ql)) return false;
    if (serviceIds?.length && !serviceIds.includes(p.deliveryService.id)) return false;
    const n = p.variants[0]?.nutrients || {};
    const cal = n.calories ?? 0, prot = n.protein ?? 0, fat = n.fat ?? 0, carbs = n.carbs ?? 0;
    if (minCal > 0    && cal   < minCal)   return false;
    if (maxCal < 1000 && cal   > maxCal)   return false;
    if (minProt > 0   && prot  < minProt)  return false;
    if (maxProt < 100 && prot  > maxProt)  return false;
    if (minFat  > 0   && fat   < minFat)   return false;
    if (maxFat  < 100 && fat   > maxFat)   return false;
    if (minCarbs > 0  && carbs < minCarbs) return false;
    if (maxCarbs < 100 && carbs > maxCarbs) return false;
    return true;
  });
  const totalElements = filtered.length;
  const totalPages    = Math.max(1, Math.ceil(totalElements / size));
  const items         = filtered.slice(page * size, (page + 1) * size);
  return { items, page, size, totalElements, totalPages };
}

function formatPrice(price) { return price != null ? `${price} ₽` : null; }
function fmt(v)             { return v != null ? +parseFloat(v).toFixed(1) : '—'; }

function primaryNutrients(product) {
  return product.variants?.[0]?.nutrients || {};
}

function countActiveFilters(f, svcIds, allSvcIds) {
  let n = 0;
  if (f.cal[0]   > 0)   n++;
  if (f.cal[1]   < 1000) n++;
  if (f.prot[0]  > 0)   n++;
  if (f.prot[1]  < 100) n++;
  if (f.fat[0]   > 0)   n++;
  if (f.fat[1]   < 100) n++;
  if (f.carbs[0] > 0)   n++;
  if (f.carbs[1] < 100) n++;
  // count service filter only if not-all selected
  if (svcIds.length > 0 && svcIds.length < allSvcIds.length) n++;
  return n;
}

/* ═══════════════════════════════════════════════════════
   RANGE FILTER (dual slider)
   ═══════════════════════════════════════════════════════ */
function RangeFilter({ label, color, value, min, max, unit, onChange }) {
  const active = value[0] > min || value[1] < max;
  return (
    <div style={{ marginBottom:18 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
        <span style={{ fontSize:12, fontWeight:600, textTransform:'uppercase', letterSpacing:'.04em',
          color: active ? `var(--${color})` : 'var(--text-2)' }}>
          {label}
        </span>
        <span style={{ fontSize:12, color:'var(--text-2)', fontVariantNumeric:'tabular-nums' }}>
          {value[0]}–{value[1]} {unit}
        </span>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
        <input type="range" min={min} max={max} value={value[0]}
          style={{ accentColor:`var(--${color})` }}
          onChange={e => onChange([Math.min(+e.target.value, value[1]), value[1]])} />
        <input type="range" min={min} max={max} value={value[1]}
          style={{ accentColor:`var(--${color})` }}
          onChange={e => onChange([value[0], Math.max(+e.target.value, value[0])])} />
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   PAGINATION
   ═══════════════════════════════════════════════════════ */
function Pagination({ page, total, onPage }) {
  if (total <= 1) return null;
  const delta = 1;
  const range = [];
  for (let i = Math.max(0, page-delta); i <= Math.min(total-1, page+delta); i++) range.push(i);

  const btn = (label, target, disabled, isActive=false) => (
    <button key={label} onClick={() => !disabled && onPage(target)} disabled={disabled}
      style={{
        minWidth:36, height:36, display:'flex', alignItems:'center', justifyContent:'center',
        borderRadius:8, border: isActive ? 'none' : '1px solid var(--border)',
        background: isActive ? 'var(--accent)' : 'var(--surface)',
        color: isActive ? '#fff' : disabled ? 'var(--text-2)' : 'var(--text)',
        fontSize:14, fontWeight: isActive ? 700 : 400,
        cursor: disabled ? 'not-allowed' : 'pointer',
        opacity: disabled ? .5 : 1, padding:'0 6px',
      }}>
      {label}
    </button>
  );

  return (
    <div style={{ display:'flex', justifyContent:'center', alignItems:'center',
      gap:4, paddingTop:32 }}>
      {btn(<Ic.ChevL/>, page-1, page===0)}
      {range[0] > 0 && <>{btn(1, 0, false, page===0)}{range[0]>1 && <span style={{color:'var(--text-2)',padding:'0 2px'}}>…</span>}</>}
      {range.map(p => btn(p+1, p, false, p===page))}
      {range[range.length-1] < total-1 && <>{range[range.length-1]<total-2 && <span style={{color:'var(--text-2)',padding:'0 2px'}}>…</span>}{btn(total, total-1, false, page===total-1)}</>}
      {btn(<Ic.ChevR/>, page+1, page===total-1)}
    </div>
  );
}

function App() {

  const [inputQ,       setInputQ]       = useState('');
  const [activeQ,      setActiveQ]      = useState('');
  const [appState,     setAppState]     = useState('home'); // home|loading|results|empty|error
  const [products,     setProducts]     = useState([]);
  const [page,         setPage]         = useState(0);
  const [totalPages,   setTotalPages]   = useState(1);
  const [totalEl,      setTotalEl]      = useState(0);
  const [selected,     setSelected]     = useState(null);
  const [errMsg,       setErrMsg]       = useState('');
  const [sort,         setSort]         = useState(DEFAULT_SORT);

  // Filters
  const [filters,      setFilters]      = useState(DEFAULT_FILTERS);
  const [services,     setServices]     = useState([]);
  const [selSvcIds,    setSelSvcIds]    = useState([]); // [] = all selected

  // Mobile
  const [isMobile,       setIsMobile]       = useState(window.innerWidth < 768);
  const [showFltSheet,   setShowFltSheet]   = useState(false);
  const [showHomeFilters,setShowHomeFilters] = useState(false);

  useEffect(() => {
    const fn = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);

  // Load delivery services on mount
  useEffect(() => {
    apiGetServices().then(setServices).catch(() => {});
  }, []);

  // Active filter count
  const activeFltCount = useMemo(() =>
    countActiveFilters(filters, selSvcIds, services), [filters, selSvcIds, services]);

  // Search
  const doSearch = useCallback(async (q, f, svcIds, sortVal, p) => {
    setAppState('loading');
    setErrMsg('');
    try {
      const allSvcIds = services.map(s => s.id);
      const effectiveSvcIds = svcIds.length===0 || svcIds.length===allSvcIds.length ? [] : svcIds;
      const res = await apiSearch({
        q, page: p, size: CFG.PAGE_SIZE, sort: sortVal,
        serviceIds: effectiveSvcIds,
        minCal:  f.cal[0],  maxCal:  f.cal[1],
        minProt: f.prot[0], maxProt: f.prot[1],
        minFat:  f.fat[0],  maxFat:  f.fat[1],
        minCarbs:f.carbs[0],maxCarbs:f.carbs[1],
      });
      setActiveQ(q);
      setPage(p);
      if (!res.items || res.items.length === 0) {
        setProducts([]);
        setAppState('empty');
      } else {
        setProducts(res.items);
        setTotalPages(res.totalPages);
        setTotalEl(res.totalElements);
        setAppState('results');
      }
    } catch (e) {
      // "Failed to fetch" = network-level error: CORS block or server not running
      const isNetErr = e instanceof TypeError && /fetch|network/i.test(e.message);
      const msg = isNetErr
        ? `Не удалось подключиться к ${CFG.API_BASE}.\n\nПроверь:\n• Бэкенд запущен\n• CORS разрешает запросы с этого источника\n• HTML открыт через http://, а не file://`
        : (e.message || 'Не удалось загрузить результаты');
      setErrMsg(msg);
      setAppState('error');
    }
  }, [services]);

  const handleSearch = () => doSearch(inputQ, filters, selSvcIds, sort, 0);

  const handleFilterChange = (key, val) => {
    const nf = { ...filters, [key]: val };
    setFilters(nf);
    if (appState !== 'home') doSearch(inputQ, nf, selSvcIds, sort, 0);
  };

  const handleSvcToggle = (id) => {
    const allIds = services.map(s => s.id);
    // current effective selection: [] means all
    const current = selSvcIds.length === 0 ? [...allIds] : [...selSvcIds];
    const next = current.includes(id) ? current.filter(x => x !== id) : [...current, id];
    // if all selected again, reset to []
    const normalized = next.length === allIds.length ? [] : next;
    setSelSvcIds(normalized);
    if (appState !== 'home') doSearch(inputQ, filters, normalized, sort, 0);
  };

  const handleReset = () => {
    setFilters(DEFAULT_FILTERS);
    setSelSvcIds([]);
    if (appState !== 'home') doSearch(inputQ, DEFAULT_FILTERS, [], sort, 0);
  };

  const handlePage = (p) => {
    doSearch(inputQ, filters, selSvcIds, sort, p);
    window.scrollTo({ top:0, behavior:'smooth' });
  };

  const handleSort = (s) => {
    setSort(s);
    if (appState !== 'home') doSearch(inputQ, filters, selSvcIds, s, 0);
  };

  const isResultsView = appState !== 'home';

              style={{ background:'none', border:'none', cursor:'pointer',

              title="На главную">🥗</button>
            <SearchBar value={inputQ} onChange={setInputQ}

              <button onClick={() => setShowFltSheet(true)}

            letterSpacing:'-.025em', marginBottom:12 }}>
            Food Helper

            marginBottom:36, maxWidth:400, lineHeight:'1.55' }}>

                marginTop:16, background:'var(--accent)', color:'#fff',
                border:'none', borderRadius:10, padding:'12px 28px',
                fontSize:14, fontWeight:600, cursor:'pointer',
                transition:'background .15s',
              }}
              onMouseEnter={e => e.currentTarget.style.background='var(--accent-dk)'}
              onMouseLeave={e => e.currentTarget.style.background='var(--accent)'}>
              Найти по фильтрам
            </button>
          )}
        </div>
      )}

      {/* ── RESULTS VIEW ── */}
      {isResultsView && (
        <div style={{
          maxWidth:1100, margin:'0 auto',
          padding: isMobile ? '20px 16px 48px' : '28px 32px 64px',
          display:'flex', gap:28, alignItems:'flex-start',
        }}>
          {/* Desktop sidebar */}
          {!isMobile && (
            <aside style={{ width:236, flexShrink:0, position:'sticky', top:72 }}>
              <div style={{ background:'var(--surface)', borderRadius:'var(--r)',
                padding:20, boxShadow:'var(--sh)' }}>
                <FilterContent
                  filters={filters} services={services} selSvcIds={selSvcIds}
                  onFilterChange={handleFilterChange}
                  onSvcToggle={handleSvcToggle}
                  onReset={handleReset}
                  activeCount={activeFltCount}/>
              </div>
            </aside>
          )}

          {/* Main content */}
          <main style={{ flex:1, minWidth:0 }}>
            {/* Results meta + sort */}
            {appState === 'results' && (
              <div style={{ display:'flex', justifyContent:'space-between',
                alignItems:'center', marginBottom:18, flexWrap:'wrap', gap:10 }}>
                <p style={{ fontSize:13, color:'var(--text-2)' }}>
                  Найдено <strong style={{ color:'var(--text)' }}>{totalEl}</strong>
                  {activeQ && <> по запросу «<strong style={{ color:'var(--text)' }}>{activeQ}</strong>»</>}
                </p>
                <SortSelect value={sort} onChange={handleSort}/>
              </div>
            )}

            {/* Loading skeletons */}
            {appState === 'loading' && (
              <div style={{ display:'grid', gap:12,
                gridTemplateColumns: isMobile ? '1fr' : 'repeat(2,1fr)' }}>
                {Array.from({length:6}).map((_,i) => <SkeletonCard key={i}/>)}
              </div>
            )}

            {/* Product grid */}
            {appState === 'results' && (
              <>
                <div style={{ display:'grid', gap:12,
                  gridTemplateColumns: isMobile ? '1fr' : 'repeat(2,1fr)' }}>
                  {products.map(p => (
                    <ProductCard key={p.id} product={p} onClick={setSelected}/>
                  ))}
                </div>
                <Pagination page={page} total={totalPages} onPage={handlePage}/>
              </>
            )}

            {/* Empty */}
            {appState === 'empty' && (
              <div className="fade-in" style={{ textAlign:'center', padding:'64px 20px' }}>
                <div style={{ color:'#9CA3AF', marginBottom:16 }}><Ic.SearchX/></div>
                <h3 style={{ fontSize:18, fontWeight:600, marginBottom:8 }}>
                  Ничего не найдено
                </h3>
                <p style={{ color:'var(--text-2)', maxWidth:300, margin:'0 auto 20px',
                  lineHeight:'1.5' }}>
                  Попробуй изменить запрос или сбросить фильтры
                </p>
                {activeFltCount > 0 && (
                  <button onClick={handleReset}
                    style={{ background:'var(--accent-lt)', color:'var(--accent)',
                      border:'none', borderRadius:8, padding:'10px 20px',
                      fontWeight:600, cursor:'pointer' }}>
                    Сбросить фильтры
                  </button>
                )}
              </div>
            )}

            {/* Error */}
            {appState === 'error' && (
              <div className="fade-in" style={{ textAlign:'center', padding:'64px 20px' }}>
                <div style={{ color:'#9CA3AF', marginBottom:16 }}><Ic.Alert/></div>
                <h3 style={{ fontSize:18, fontWeight:600, marginBottom:12 }}>
                  Что-то пошло не так
                </h3>
                <pre style={{
                  color:'var(--text-2)', marginBottom:24, maxWidth:380, margin:'0 auto 24px',
                  fontSize:13, lineHeight:'1.65', whiteSpace:'pre-wrap', textAlign:'left',
                  background:'#F9FAFB', borderRadius:8, padding:'12px 16px',
                  border:'1px solid var(--border)', fontFamily:'inherit',
                }}>{errMsg}</pre>
                <button onClick={() => doSearch(inputQ, filters, selSvcIds, sort, page)}
                  style={{ background:'var(--accent)', color:'#fff', border:'none',
                    borderRadius:8, padding:'10px 20px', fontWeight:600, cursor:'pointer' }}>
                  Попробовать снова
                </button>
              </div>
            )}
          </main>
        </div>
      )}

      {/* ── PRODUCT DETAIL ── */}
      {selected && (
        isMobile
          ? <BottomSheet onClose={() => setSelected(null)}>
              <ProductDetailContent product={selected} onClose={() => setSelected(null)}/>
            </BottomSheet>
          : <ProductModal product={selected} onClose={() => setSelected(null)}/>
      )}

      {/* ── FILTER SHEET (mobile) ── */}
      {showFltSheet && (
        <BottomSheet onClose={() => setShowFltSheet(false)}>
          <FilterContent
            filters={filters} services={services} selSvcIds={selSvcIds}
            onFilterChange={handleFilterChange}
            onSvcToggle={handleSvcToggle}
            onReset={handleReset}
            activeCount={activeFltCount}/>
          <button onClick={() => setShowFltSheet(false)}
            style={{ width:'100%', marginTop:20, padding:14,
              background:'var(--accent)', color:'#fff', border:'none',
              borderRadius:10, fontSize:15, fontWeight:600, cursor:'pointer' }}>
            Показать результаты
          </button>
        </BottomSheet>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
