# nginx config for food-helper — Docker Compose setup
# ──────────────────────────────────────────────────────
# Used by the nginx service in docker-compose.prod.yml.
# Backend is reached via Docker service name "api", not 127.0.0.1.
#
# Frontend build → mount to /usr/share/nginx/html in the nginx container
# (see docker-compose.prod.yml volumes)

upstream backend {
    server api:8080;
}

server {
    listen 80;
    listen [::]:80;
    server_name 158.160.201.194;

    access_log /var/log/nginx/food-helper.access.log;
    error_log  /var/log/nginx/food-helper.error.log warn;

    client_max_body_size 5m;

    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    location /api/ {
        proxy_pass http://backend;
    }

    location /health {
        proxy_pass http://backend;
        access_log off;
    }

    location /ready {
        proxy_pass http://backend;
        access_log off;
    }

    location /swagger {
        proxy_pass http://backend;
    }

    location /openapi/ {
        proxy_pass http://backend;
    }

    location /metrics {
        allow 127.0.0.1;
        allow 172.16.0.0/12;  # Docker internal networks
        deny all;
        proxy_pass http://backend;
    }

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
