# Prod-режим: postgres + api + nginx
# Запуск: docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Перед запуском:
#   - положи frontend build в ./frontend-dist/  (будет смонтирован в nginx)
#   - убедись, что .env заполнен (POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD, API_KEY)

services:
  postgres:
    image: postgres:16-alpine
    container_name: food_helper_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - food_helper_pgdata:/var/lib/postgresql/data
    # порт не пробрасываем наружу в проде
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food_helper_api
    env_file:
      - .env
    environment:
      DB_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    # порт не пробрасываем наружу — nginx проксирует внутри сети
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: food_helper_nginx
    ports:
      - "80:80"
    volumes:
      - ./docs/nginx.docker.conf:/etc/nginx/conf.d/food-helper.conf:ro
      - ./frontend-dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  food_helper_pgdata:
  nginx_logs:
