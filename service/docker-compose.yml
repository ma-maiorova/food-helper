# Запуск:
#   local: docker compose --env-file .env.local up -d
#   prod:  docker compose --env-file .env.prod  up -d
#
# Порты управляются через env-файл:
#   Nginx    → ${NGINX_BIND_HOST:-0.0.0.0}:${NGINX_PORT:-80}:80
#   Postgres → ${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432
#   API      — порт наружу НЕ пробрасывается, nginx проксирует внутри сети
#              Swagger доступен через nginx: http://host:PORT/swagger
#
# Monitoring запускается отдельно:
#   docker compose -f monitoring/docker-compose.yml --env-file .env.local up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: food_helper_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_BIND_HOST:-0.0.0.0}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food_helper_api
    environment:
      JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
    networks:
      - app_net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: food_helper_nginx
    ports:
      - "${NGINX_BIND_HOST:-0.0.0.0}:${NGINX_PORT:-80}:80"
    volumes:
      - ./docs/nginx.docker.conf:/etc/nginx/conf.d/food-helper.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
      - ./frontend-dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    networks:
      - app_net
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  app_net:
    name: food_helper_net

volumes:
  pgdata:
    name: food_helper_pgdata
  nginx_logs:
    name: food_helper_nginx_logs
