ktor {
  deployment {
    port = 8080
  }

    application {
        modules = [ org.example.ApplicationKt.module ]
    }

  database {
    jdbcUrl = "jdbc:postgresql://127.0.0.1:5435/food_helper"
    driverClassName = "org.postgresql.Driver"
    username = "food_user"
    password = "food_pass"
    maximumPoolSize = 10
  }

  # Импорт продуктов от парсера (POST /api/v1/admin/import)
  import {
    # Максимум элементов, обрабатываемых за один запрос (при большем числе берём первые N)
    maxItemsPerRequest = 500
    # Размер внутреннего батча: элементы разбиваются на чанки по N штук и обрабатываются батчами
    chunkSize = 100
  }
}
