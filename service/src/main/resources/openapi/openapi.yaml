  # ── ADMIN — PRODUCTS ─────────────────────────────────────────────────────────

  /api/v1/admin/ping:
    get:
      tags: [admin-products]
      summary: Проверка API-ключа
      operationId: adminPing
      security:
        - ApiKeyAuth: []
      description: |
        Возвращает `{"ok":true}` если ключ корректен. Удобно для проверки аутентификации
        без побочных эффектов.
      responses:
        '200':
          description: Ключ корректен
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              example:
                ok: true
        '401':
          description: Отсутствует или неверный X-Api-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/products/{id}:
    patch:
      tags: [admin-products]
      summary: Частичное обновление продукта
      operationId: patchProduct
      security:
        - ApiKeyAuth: []
      description: |
        Обновляет поля продукта и/или его первого варианта.
        Поля, отсутствующие в теле запроса, не меняются.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Неверные параметры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Отсутствует или неверный X-Api-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Продукт не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [admin-products]
      summary: Удалить продукт
      operationId: deleteProduct
      security:
        - ApiKeyAuth: []
      description: |
        Удаляет продукт и все его варианты (CASCADE).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Удалено
        '401':
          description: Отсутствует или неверный X-Api-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Продукт не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
