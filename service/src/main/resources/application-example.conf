ktor {
  deployment {
    port = 8080
  }

    application {
        modules = [ org.example.ApplicationKt.module ]
    }

  database {
    jdbcUrl = "jdbc:postgresql://"
    driverClassName =
    username =
    password =
    maximumPoolSize = 10
  }

  # Ключ для /api/v1/admin/* (X-Api-Key). Переопределяется через ADMIN_API_KEY env var.
  admin {
    apiKey =
  }

  # Импорт продуктов от парсера (POST /api/v1/admin/import)
  import {
    # Максимум элементов за один запрос; превышение → 400 Bad Request (запрос отклоняется целиком)
    maxItemsPerRequest = 500
    # Размер внутреннего батча: элементы разбиваются на чанки по N штук и обрабатываются батчами
    chunkSize = 100
  }
}
