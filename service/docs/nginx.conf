# nginx config for food-helper — HTTP setup (IP-based, no TLS)
# ─────────────────────────────────────────────────────────────
# Place at : /etc/nginx/sites-available/food-helper
# Enable   : sudo ln -s /etc/nginx/sites-available/food-helper /etc/nginx/sites-enabled/food-helper
# Test     : sudo nginx -t
# Reload   : sudo systemctl reload nginx
#
# Frontend build  → /var/www/food-helper/  (e.g. dist/ or build/ directory contents)
# Backend (Ktor)  → localhost:8080
# Public IP       : 158.160.201.194

server {
    listen 80;
    listen [::]:80;
    server_name 158.160.201.194;

    # --- Logs ---
    access_log /var/log/nginx/food-helper.access.log;
    error_log  /var/log/nginx/food-helper.error.log warn;

    # --- Request size ---
    # Import endpoint: up to 500 items × ~2KB ≈ 1MB; 5MB gives headroom.
    client_max_body_size 5m;

    # --- Proxy timeouts ---
    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # --- Proxy headers (set once at server level, inherited by all proxy locations) ---
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # --- API routes → Ktor backend ---
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
    }

    # --- Health / readiness probes ---
    location /health {
        proxy_pass http://127.0.0.1:8080;
        access_log off;
    }

    location /ready {
        proxy_pass http://127.0.0.1:8080;
        access_log off;
    }

    # --- Swagger UI (API protected by X-Api-Key, swagger is fine to expose) ---
    location /swagger {
        proxy_pass http://127.0.0.1:8080;
    }

    location /openapi/ {
        proxy_pass http://127.0.0.1:8080;
    }

    # --- Metrics: localhost only (Prometheus scrape target) ---
    location /metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8080;
    }

    # --- Frontend SPA ---
    root /var/www/food-helper;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}


