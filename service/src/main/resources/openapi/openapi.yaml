openapi: 3.0.3
info:
  title: Food Helper API
  description: API для работы с продуктами и службами доставки
  version: 1.0.0

servers:
  - url: /
    description: Текущий сервер

paths:
  /api/v1/delivery-services:
    get:
      summary: Список служб доставки
      description: Возвращает список служб доставки. Можно отфильтровать только активные.
      operationId: listDeliveryServices
      parameters:
        - name: active
          in: query
          required: false
          description: Фильтр по активности (true/false, 1/0)
          schema:
            type: string
            enum: [ "true", "false", "1", "0" ]
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeliveryService'
        '400':
          description: Неверные параметры запроса (формат, тип, диапазон)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                requestId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                code: "VALIDATION_ERROR"
                message: "Параметры запроса не прошли проверку"
                status: 400
                path: "/api/v1/delivery-services"
                timestamp: "2025-02-21T12:00:00Z"
                fieldErrors: [{ "field": "active", "message": "must be true or false" }]
        '422':
          description: Запрос корректен по формату, но не прошёл бизнес-валидацию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/products:
    get:
      summary: Поиск продуктов
      description: Поиск продуктов с пагинацией и фильтрами по питательности и службам доставки.
      operationId: searchProducts
      parameters:
        - name: q
          in: query
          required: false
          description: Поисковый запрос
          schema:
            type: string
        - name: deliveryServiceIds
          in: query
          required: false
          description: ID служб доставки через запятую
          schema:
            type: string
            example: "1,2"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          required: false
          description: Сортировка (поле,направление). Поля — name, price; направление — asc, desc
          schema:
            type: string
            example: "name,asc"
        - name: minCalories
          in: query
          required: false
          schema:
            type: integer
        - name: maxCalories
          in: query
          required: false
          schema:
            type: integer
        - name: minProtein
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: maxProtein
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: minFat
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: maxFat
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: minCarbs
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: maxCarbs
          in: query
          required: false
          schema:
            type: number
            format: double
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPage'
        '400':
          description: Неверные параметры запроса (формат, тип, диапазон)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                requestId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                code: "VALIDATION_ERROR"
                message: "Параметры запроса не прошли проверку"
                status: 400
                path: "/api/v1/products"
                timestamp: "2025-02-21T12:00:00Z"
                details: ["size must be between 1 and 100"]
                fieldErrors: [{ "field": "size", "message": "must be between 1 and 100" }]
        '422':
          description: Запрос корректен по формату, но не прошёл бизнес-валидацию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    DeliveryService:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        name:
          type: string
        siteUrl:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        active:
          type: boolean
          default: true

    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        url:
          type: string
        price:
          type: integer
        currency:
          type: string
          default: RUB
        deliveryService:
          $ref: '#/components/schemas/DeliveryService'
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariant'

    ProductVariant:
      type: object
      properties:
        id:
          type: integer
          format: int64
        manufacturer:
          type: string
          nullable: true
        composition:
          type: string
          nullable: true
        weight:
          type: integer
          nullable: true
        nutrients:
          $ref: '#/components/schemas/Nutrients'

    Nutrients:
      type: object
      properties:
        calories:
          type: integer
          nullable: true
        protein:
          type: number
          format: double
          nullable: true
        fat:
          type: number
          format: double
          nullable: true
        carbs:
          type: number
          format: double
          nullable: true

    ProductPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      required:
        - requestId
        - code
        - message
        - status
        - path
        - timestamp
      properties:
        requestId:
          type: string
          description: Идентификатор запроса (корреляция в логах), UUID
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - BUSINESS_VALIDATION_ERROR
            - NOT_FOUND
            - DB_ERROR
            - INTERNAL_ERROR
        message:
          type: string
          description: Человекочитаемое описание ошибки
        status:
          type: integer
          description: HTTP-статус (400, 404, 422, 500)
        path:
          type: string
          description: Путь запроса
        timestamp:
          type: string
          format: date-time
        details:
          type: array
          items:
            type: string
          description: Дополнительные сообщения
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
          description: Ошибки по полям ввода (для подсветки в UI)

    FieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: Имя параметра/поля
        message:
          type: string
          description: Сообщение об ошибке для поля
