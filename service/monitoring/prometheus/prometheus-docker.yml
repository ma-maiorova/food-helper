global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'food-helper'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['food_helper_api:8080']
        labels:
          app: 'food-helper'
          env: 'docker'

  - job_name: 'prometheus'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          app: 'prometheus'
