ktor {
  deployment {
    port = 8080
  }

  application {
    modules = [ org.example.ApplicationKt.module ]
  }

  database {
    jdbcUrl = ${?JDBC_URL}
    driverClassName = "org.postgresql.Driver"
    username = ${?POSTGRES_USER}
    password = ${?POSTGRES_PASSWORD}
    maximumPoolSize = 10
  }

  admin {
    apiKey = ${?ADMIN_API_KEY}
  }

  import {
    maxItemsPerRequest = 500
    chunkSize = 100
  }
}
